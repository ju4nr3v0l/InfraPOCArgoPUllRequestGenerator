apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landing-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ju4nr3v0l/landingPOCArgoPUllRequestGenerator.git
    targetRevision: main
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: landing-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
