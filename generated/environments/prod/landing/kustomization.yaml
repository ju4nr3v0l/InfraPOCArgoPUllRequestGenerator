apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: landing-prod

resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: landingpage-content
    files:
      - site/index.html
      - site/style.css

commonAnnotations:
  release.argocd.io/source-sha: "e1142c482ac5396dceb545166e3e215511c21ba6"

generatorOptions:
  disableNameSuffixHash: true
