apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: landing-prod

resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: landingpage-content
    files:
      - site/index.html
      - site/style.css

commonAnnotations:
  release.argocd.io/source-sha: "8f30f09268b8dddea6ebd282156cf42dbb3c6e53"

generatorOptions:
  disableNameSuffixHash: true
