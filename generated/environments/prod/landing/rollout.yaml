apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: landingpage
  labels:
    app: landingpage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landingpage
  strategy:
    blueGreen:
      activeService: landingpage-active
      previewService: landingpage-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: landingpage
    spec:
      containers:
        - name: landing
          image: juanmarulanda/landingpocargoprpreview@sha256:b74c1c0155605468f2fb36b7ebf9a8dd0fd230673f056b83b2126ffc04d5fb64
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
