apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: landingpage
  labels:
    app: landingpage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landingpage
  strategy:
    blueGreen:
      activeService: landingpage-active
      previewService: landingpage-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: landingpage
    spec:
      serviceAccountName: landing-preview
      containers:
        - name: landing
          image: juanmarulanda/landingpocargoprpreview@sha256:549c8ee3e9196b8eeadb2aeb8c2d64918d4834d243c2799e1d2c6030fe633801
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
