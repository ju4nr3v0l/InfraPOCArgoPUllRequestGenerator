apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: preview-pr-999

resources:
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml

configMapGenerator:
  - name: landingpage-content
    files:
      - site/index.html
      - site/style.css

commonLabels:
  preview.argocd.io/pr-number: "999"
  preview.argocd.io/branch: "manual-test"
  preview.argocd.io/head-sha: "manual-test"

nameSuffix: "-pr-999"

generatorOptions:
  disableNameSuffixHash: true
